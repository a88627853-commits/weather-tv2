<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

#tv {
    width:1000px;
    height:1000px;
    margin:auto;
    position:relative;
}

#map {
    width:100%;
    height:100%;
    position:absolute;
    object-fit:cover;
}

/* =========================
   MARKERY (KROPKI)
========================= */
.marker {
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    border:2px solid white;
    transition:all 0.6s ease;
}

.marker.sunny { background:#00ff00; }
.marker.cloudy { background:#a0a0a0; }
.marker.rain { background:#0099ff; }
.marker.storm { background:#ff0000; }
.marker.fog { background:#bbbbbb; }

/* =========================
   TICKER
========================= */
#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    overflow:hidden;
    white-space:nowrap;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 90s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

/* =========================
   EAS
========================= */
#eas {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:red;
    font-size:40px;
    z-index:999;
}

/* =========================
   SLIDER KALIBRACJI MAPY
========================= */
#sliderBox {
    position:fixed;
    top:10px;
    left:10px;
    background:#111;
    padding:10px;
    z-index:9999;
}

</style>
</head>

<body>

<div id="sliderBox">
    X offset <input id="xoff" type="range" min="-100" max="100" value="0"><br>
    Y offset <input id="yoff" type="range" min="-100" max="100" value="0">
</div>

<div id="tv">
    <img id="map" src="map.png">
</div>

<div id="ticker"><span>LOADING...</span></div>
<div id="eas"></div>

<script>

/* =========================
   MAPA + KALIBRACJA
========================= */
const MAP = {
    latMin:49.0,
    latMax:55.2,
    lonMin:14.0,
    lonMax:24.5
};

function geo(lat, lon){
    const m = document.getElementById("map");

    const xoff = parseInt(document.getElementById("xoff").value);
    const yoff = parseInt(document.getElementById("yoff").value);

    return {
        x: ((lon-MAP.lonMin)/(MAP.lonMax-MAP.lonMin))*m.clientWidth + xoff,
        y: ((MAP.latMax-lat)/(MAP.latMax-MAP.latMin))*m.clientHeight + yoff
    };
}


/* =========================
   TTS (BEZ GLITCHY)
========================= */
const TTS = {
    lastText: "",

    speak(text){
        if(!("speechSynthesis" in window)) return;

        if(text === this.lastText) return; // 🔥 FIX: brak powtórek

        this.lastText = text;

        speechSynthesis.cancel();

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "pl-PL";
        msg.rate = 1;

        speechSynthesis.speak(msg);
    }
};


/* =========================
   KOLOR POGODY
========================= */
function getClass(city){
    if(!city.temp) return "fog";

    if(city.code >= 1000 && city.code < 1100) return "sunny";
    if(city.text && city.text.toLowerCase().includes("rain")) return "rain";
    if(city.text && city.text.toLowerCase().includes("thunder")) return "storm";
    if(city.cloud > 70) return "cloudy";

    return "cloudy";
}


/* =========================
   MARKERY
========================= */
function draw(cities){

    document.querySelectorAll(".marker").forEach(e=>e.remove());

    cities.forEach(c=>{
        if(!c.lat || !c.lon) return;

        let p = geo(c.lat,c.lon);

        let d = document.createElement("div");
        d.className = "marker " + getClass(c);

        d.style.left = p.x+"px";
        d.style.top = p.y+"px";

        /* ikona pogody */
        if(c.icon){
            d.style.backgroundImage = `url(${c.icon})`;
            d.style.backgroundSize = "cover";
        }

        document.getElementById("tv").appendChild(d);
    });
}


/* =========================
   SMOOTH TICKER + TTS FIX
========================= */
let lastSnapshot = "";

function ticker(cities){

    const text = cities.map(c => {

        const temp = c.temp ?? "?";
        const wind = c.wind ?? "?";
        const hum = c.humidity ?? "?";
        const pres = c.pressure ?? "?";

        return `${c.name}: ${temp}°C | Wiatr ${wind}km/h | Wilg ${hum}% | Ciśn ${pres}hPa`;

    }).join(" || ");

    document.querySelector("#ticker span").textContent = text;

    /* 🔥 TTS tylko gdy zmiana */
    if(text !== lastSnapshot){
        TTS.speak("Nowa prognoza pogodowa została zaktualizowana");
        lastSnapshot = text;
    }
}


/* =========================
   EAS
========================= */
function eas(cities){
    let active = cities.some(c=>c.alert==="EAS");
    let box = document.getElementById("eas");

    if(active){
        box.style.display="flex";
        box.innerText="⚠ EAS ACTIVE ⚠";
        speechSynthesis.cancel();
    } else {
        box.style.display="none";
    }
}


/* =========================
   MAIN LOOP (SMOOTH UPDATE)
========================= */
function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        draw(d.cities);
        ticker(d.cities);
        eas(d.cities);
    });
}

setInterval(load, 10000); // stabilniej niż spam 15s
load();

</script>

</body>
</html>

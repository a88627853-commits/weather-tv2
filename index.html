<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; }

#tv {
    width:1000px;
    height:1000px;
    margin:auto;
    position:relative;
}

#map {
    width:100%;
    height:100%;
    position:absolute;
}

.marker {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    background:lime;
}

#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    white-space:nowrap;
    overflow:hidden;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 60s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}
</style>
</head>

<body>

<div id="tv">
    <img id="map" src="map.png">
</div>

<div id="ticker"><span>LOADING...</span></div>

<script>

function draw(cities){
    document.querySelectorAll(".marker").forEach(e=>e.remove());
}

function ticker(cities){

    const safe = (v, u="") => (v ?? "?") + u;

    const text = cities.map(c => {
        return `${c.name}: ${safe(c.temp,"°C")} | ` +
               `Wiatr: ${safe(c.wind,"km/h")} | ` +
               `Wilg: ${safe(c.humidity,"%")} | ` +
               `Ciśn: ${safe(c.pressure,"hPa")}`;
    }).join(" || ");

    document.querySelector("#ticker span").textContent = text;
}

function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        ticker(d.cities);
    });
}

setInterval(load,15000);
load();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* 🔥 TV FRAME */
#tv {
    width:960px;
    height:960px;
    margin:auto;
    position:relative;
}

/* 🗺️ MAPA (NAPRAWIONA W 100%) */
#map {
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;
    z-index:0;
    object-fit:cover;
}

/* 📍 MARKERY */
.marker {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    z-index:2;
}

.marker.OK { background:lime; }
.marker.EAS { background:red; }

/* 📺 TICKER */
#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    overflow:hidden;
    white-space:nowrap;
    z-index:10;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 40s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

/* 🚨 EAS OVERLAY */
#eas {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:red;
    color:white;
    font-size:40px;
    text-align:center;
    z-index:999;
}
</style>
</head>

<body>

<div id="tv">
    <!-- 🗺️ MAPA W KOŃCU DZIAŁA -->
    <img id="map" src="map.png">
</div>

<div id="ticker"><span>LOADING...</span></div>

<div id="eas"></div>

<script>

/* ======================
   MAPA GEO
====================== */
const MAP = {
    latMin:49.0,
    latMax:55.2,
    lonMin:14.0,
    lonMax:24.5
};

function geoToXY(lat, lon){
    const m = document.getElementById("map");

    return {
        x: ((lon - MAP.lonMin) / (MAP.lonMax - MAP.lonMin)) * m.clientWidth,
        y: ((MAP.latMax - lat) / (MAP.latMax - MAP.latMin)) * m.clientHeight
    };
}

/* ======================
   MAP DRAW
====================== */
function draw(cities){
    document.querySelectorAll(".marker").forEach(m => m.remove());

    cities.forEach(c => {
        if(!c.lat || !c.lon) return;

        let p = geoToXY(c.lat, c.lon);

        let el = document.createElement("div");

        el.className = "marker " + (c.alert === "EAS" ? "EAS" : "OK");

        el.style.left = p.x + "px";
        el.style.top = p.y + "px";

        document.getElementById("tv").appendChild(el);
    });
}

/* ======================
   TICKER (1 LINIA)
====================== */
function updateTicker(cities){
    document.querySelector("#ticker span").innerText =
        cities.map(c => {
            let cur = c.current || {};

            return `${c.name} Temp: ${cur.temperature_2m ?? "brak"}°C | ` +
                   `Wilg: ${cur.relative_humidity_2m ?? "brak"}% | ` +
                   `Wiatr: ${cur.wind_speed_10m ?? "brak"} m/s | ` +
                   `Ciśn: ${cur.pressure_msl ?? "brak"} hPa`;
        }).join(" | ");
}

/* ======================
   EAS SYSTEM
====================== */
function eas(cities){
    let easActive = cities.some(c => c.alert === "EAS");

    let box = document.getElementById("eas");

    if(easActive){
        box.style.display = "flex";
        box.innerText = "⚠ EAS ALERT ⚠\nWARUNKI EKSTREMALNE";
    } else {
        box.style.display = "none";
    }
}

/* ======================
   MAIN LOOP
====================== */
function load(){
    fetch("/data")
    .then(r => r.json())
    .then(d => {

        let cities = d.cities;

        updateTicker(cities);
        draw(cities);
        eas(cities);
    });
}

setInterval(load, 15000);
load();

</script>

</body>
</html>

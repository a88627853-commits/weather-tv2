<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* MAPA */
#tv {
    width:1000px;
    height:1000px;
    margin:auto;
    position:relative;
}

#map {
    width:100%;
    height:100%;
    position:absolute;
    object-fit:cover;
}

/* MARKER */
.marker {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    z-index:5;
}

/* ICON */
.wxicon {
    position:absolute;
    width:32px;
    height:32px;
    transform:translate(-50%,-50%);
    pointer-events:none;
    z-index:4;
}

/* PANEL SUWAKA */
#calib {
    position:fixed;
    top:10px;
    left:10px;
    background:#111;
    padding:10px;
    border:1px solid #444;
    z-index:999;
}

#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    overflow:hidden;
    white-space:nowrap;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 120s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

#eas {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:red;
    font-size:40px;
    z-index:999;
}
</style>
</head>

<body>

<!-- SUWAK KALIBRACJI -->
<div id="calib">
    X offset <input type="range" id="xoff" min="-100" max="100" value="0"><br>
    Y offset <input type="range" id="yoff" min="-100" max="100" value="0">
</div>

<div id="tv">
    <img id="map" src="map.png">
</div>

<div id="ticker"><span>LOADING...</span></div>
<div id="eas"></div>

<script>

/* MAPA */
const MAP = {
    latMin:49.0,
    latMax:55.2,
    lonMin:14.0,
    lonMax:24.5
};

function geo(lat, lon){

    const m = document.getElementById("map");

    let xoff = parseInt(document.getElementById("xoff").value);
    let yoff = parseInt(document.getElementById("yoff").value);

    return {
        x: ((lon-MAP.lonMin)/(MAP.lonMax-MAP.lonMin))*m.clientWidth + xoff,
        y: ((MAP.latMax-lat)/(MAP.latMax-MAP.latMin))*m.clientHeight + yoff
    };
}

/* TTS */
const TTS = {
    last:0,
    speak(t){
        if(!("speechSynthesis" in window)) return;

        if(Date.now()-this.last < 60000) return;

        speechSynthesis.cancel();

        let msg = new SpeechSynthesisUtterance(t);
        msg.lang="pl-PL";
        msg.rate=1;

        speechSynthesis.speak(msg);

        this.last = Date.now();
    }
};

/* KOLORY */
function getColor(code){
    if(code===1000) return "yellow";
    if([1003,1006,1009].includes(code)) return "gray";
    if(code>=1063 && code<=1246) return "deepskyblue";
    if(code>=1273) return "red";
    return "lime";
}

/* RYSOWANIE */
function draw(cities){

    document.querySelectorAll(".marker,.wxicon").forEach(e=>e.remove());

    cities.forEach(c=>{

        if(!c.lat || !c.lon) return;

        let p = geo(c.lat,c.lon);

        let dot = document.createElement("div");
        dot.className="marker";
        dot.style.left=p.x+"px";
        dot.style.top=p.y+"px";
        dot.style.background=getColor(c.code);

        document.getElementById("tv").appendChild(dot);

        if(c.icon){
            let img = document.createElement("img");
            img.className="wxicon";
            img.src = c.icon.startsWith("http") ? c.icon : "https:" + c.icon;

            img.style.left=(p.x-30)+"px";
            img.style.top=(p.y+30)+"px";

            document.getElementById("tv").appendChild(img);
        }
    });
}

/* TICKER */
function ticker(cities){

    const safe=v=>(v===null||v===undefined)?"?":v;

    let text = cities.map(c=>{

        return `${c.name} | ${safe(c.temp)}°C | ${safe(c.wind)}km/h | ${safe(c.humidity)}% | ${safe(c.pressure)}hPa`;

    }).join(" || ");

    document.querySelector("#ticker span").textContent=text;

    TTS.speak(text);
}

/* EAS */
function eas(cities){
    let active = cities.some(c=>c.code>=1273);

    let box=document.getElementById("eas");

    if(active){
        box.style.display="flex";
        box.innerText="⚠ EAS WEATHER ALERT ⚠";
        speechSynthesis.cancel();
    }else{
        box.style.display="none";
    }
}

/* LOOP */
function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        draw(d.cities);
        ticker(d.cities);
        eas(d.cities);
    });
}

load();
setInterval(load,3600000);

/* live update suwaków */
document.getElementById("xoff").oninput=()=>load();
document.getElementById("yoff").oninput=()=>load();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV FINAL</title>

<style>
body { margin:0; background:black; font-family:Arial; color:white; overflow:hidden; }

#tv {
    width:960px;
    height:960px;
    margin:auto;
    position:relative;
}

#map {
    width:100%;
    height:100%;
    position:absolute;
    object-fit:cover;
    opacity:0.85;
}

.marker {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    transform:translate(-50%,-50%);
}

.marker.RED { background:red; }
.marker.YELLOW { background:orange; }
.marker.LOW { background:lime; }

#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 25s linear infinite;
}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-100%);}
}

#eas {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    text-align:center;
    background:red;
    z-index:999;
}
</style>
</head>

<body>

<button onclick="document.documentElement.requestFullscreen()">FULLSCREEN</button>

<div id="tv">
    <img id="map" src="map.png">
</div>

<div id="ticker"><span>LOADING...</span></div>

<div id="eas"></div>

<script>

const MAP = {
    latMin:49.0,
    latMax:55.2,
    lonMin:14.0,
    lonMax:24.5
};

function geoToXY(lat,lon){
    const m=document.getElementById("map");
    return {
        x:((lon-MAP.lonMin)/(MAP.lonMax-MAP.lonMin))*m.clientWidth,
        y:((MAP.latMax-lat)/(MAP.latMax-MAP.latMin))*m.clientHeight
    };
}

function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "pl-PL";
    msg.rate = 1;
    speechSynthesis.speak(msg);
}

function buildVoice(c){
    let cur = c.current;
    let h = c.hourly;

    return `${c.name}. Temperatura ${cur.temperature_2m} stopni. Wilgotność ${cur.relative_humidity_2m} procent. Wiatr ${h.wind_speed_10m?.[0]} metrów na sekundę. Porywy ${h.wind_gusts_10m?.[0]}. Nasłonecznienie ${h.sunshine_duration?.[0]} sekund.`;
}

let cities=[];
let i=0;

function loopVoice(){
    if(i>=cities.length){
        i=0;
        setTimeout(loopVoice,10000);
        return;
    }

    let text = buildVoice(cities[i]);
    speak(text);

    i++;
    setTimeout(loopVoice,10000);
}

function draw(cities){
    document.querySelectorAll(".marker").forEach(m=>m.remove());

    cities.forEach(c=>{
        let p=geoToXY(c.lat,c.lon);

        let m=document.createElement("div");
        m.className="marker "+c.alert;
        m.style.left=p.x+"px";
        m.style.top=p.y+"px";

        document.getElementById("tv").appendChild(m);
    });
}

function eas(){
    fetch("/eas/global")
    .then(r=>r.json())
    .then(e=>{
        let box=document.getElementById("eas");

        if(e.level!="GREEN"){
            box.style.display="flex";
            box.innerText="ALERT\n"+e.cities.join(", ");
        } else {
            box.style.display="none";
        }
    });
}

function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        cities=d.cities;

        eas();

        document.querySelector("#ticker span").innerText =
            d.cities.map(c=>`${c.name}: ${c.current.temperature_2m}°C`).join(" | ");

        draw(d.cities);

        if(i===0) loopVoice();
    });
}

setInterval(load,30000);
load();

</script>

</body>
</html>

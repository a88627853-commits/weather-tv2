<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV - Radio Ranking Mode</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* ===== LISTA ===== */
#list {
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:8px;
    height: calc(100vh - 60px);
    overflow:auto;
}

.city {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    background:#111;
    border-left:6px solid gray;
    transition:0.3s;
}

.city:hover {
    background:#1a1a1a;
}

.city img {
    width:32px;
    height:32px;
}

/* ===== COLORS ===== */
.sunny { border-left-color:#00ff00; }
.cloudy { border-left-color:#999; }
.rain { border-left-color:#0099ff; }
.storm { border-left-color:#ff0000; }
.fog { border-left-color:#666; }

/* ===== TICKER ===== */
#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    white-space:nowrap;
    overflow:hidden;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 60s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

/* ===== TOP BAR ===== */
#top {
    padding:10px;
    background:#000;
    border-bottom:1px solid #222;
    color:lime;
    font-size:14px;
}

/* ===== EAS ===== */
#eas {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:40px;
    z-index:999;
}
</style>
</head>

<body>

<div id="top">WEATHER TV - RADIO RANKING SYSTEM</div>

<div id="list"></div>

<div id="ticker"><span>LOADING...</span></div>
<div id="eas"></div>

<script>

/* =========================
   GLOBAL DATA
========================= */
let GLOBAL = [];

/* =========================
   WEATHER SCORE
========================= */
function weatherScore(c){

    if(!c || !c.temp) return 999;

    let score = 0;
    const t = (c.text || "").toLowerCase();

    /* =========================
       🔴 EKSTREMALNE WARUNKI
    ========================= */
    if(t.includes("thunder")) score += 120;
    else if(t.includes("heavy rain") || t.includes("downpour")) score += 100;

    /* =========================
       🟠 SILNE OPADY
    ========================= */
    else if(t.includes("rain")) score += 55;
    else if(t.includes("drizzle")) score += 15;

    /* =========================
       🌫 MGŁA / WIDOCZNOŚĆ
    ========================= */
    if(t.includes("fog")) score += 70;
    if(t.includes("mist")) score += 50;

    /* =========================
       ☁ CHMURY (łagodnie)
    ========================= */
    score += (c.cloud ?? 0) * 0.15;

    /* =========================
       💨 WIATR (realistycznie)
    ========================= */
    score += (c.wind ?? 0) * 0.4;

    /* =========================
       👀 WIDOCZNOŚĆ (mały wpływ)
    ========================= */
    if(c.vis != null){
        if(c.vis < 2) score += 60;
        else if(c.vis < 5) score += 30;
    }

    return score;
}

/* =========================
   COLORS
========================= */
function cls(c){
    if(!c || !c.temp) return "fog";
    if(c.text && c.text.toLowerCase().includes("thunder")) return "storm";
    if(c.text && c.text.toLowerCase().includes("rain")) return "rain";
    if(c.cloud > 70) return "cloudy";
    return "sunny";
}

/* =========================
   TTS ENGINE
========================= */
const SpeechQueue = {
    q: [],
    speaking:false,

    beep(){
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        o.frequency.value = 440;
        o.connect(ctx.destination);
        o.start();
        setTimeout(()=>o.stop(),120);
    },

    next(){
        if(this.q.length === 0){
            this.speaking = false;
            return;
        }

        this.speaking = true;

        const msg = new SpeechSynthesisUtterance(this.q.shift());
        msg.lang = "pl-PL";
        msg.rate = 0.95;

        msg.onend = () => {
            this.beep();
            setTimeout(()=>this.next(),400);
        };

        speechSynthesis.speak(msg);
    },

    add(t){
        this.q.push(t);
        if(!this.speaking) this.next();
    }
};

/* =========================
   DRAW LIST (RANKING)
========================= */
function draw(cities){

    const list = document.getElementById("list");
    list.innerHTML = "";

    const clean = cities.filter(c =>
        c && c.name && c.temp != null
    );

    const sorted = [...clean].sort((a,b)=>
        weatherScore(b) - weatherScore(a)
    );

    sorted.forEach((c,i)=>{

        const div = document.createElement("div");
        div.className = "city " + cls(c);

        const danger =
            weatherScore(c) > 120 ? "🔴 EKSTREMALNA"
            : weatherScore(c) > 80 ? "🟠 ZŁA"
            : weatherScore(c) > 50 ? "🟡 ŚREDNIA"
            : "🟢 DOBRA";

        div.innerHTML = `
            <div>
                <b>#${i+1} ${c.name}</b> ${danger}<br>
                ${c.text ?? ""}
            </div>

            <div>
                🌡 ${c.temp}°C<br>
                💨 ${c.wind ?? "?"} km/h<br>
                💧 ${c.humidity ?? "?"}%<br>
                ⬇ ${c.pressure ?? "?"} hPa
            </div>

            <div>
                ${c.icon ? `<img src="${c.icon}">` : ""}
            </div>
        `;

        list.appendChild(div);
    });
}

/* =========================
   TICKER
========================= */
function ticker(cities){

    const text = cities.map(c=>{
        return `${c.name}: ${c.temp ?? "?"}°C | Wiatr ${c.wind ?? "?"}km/h | Wilg ${c.humidity ?? "?"}% | Ciśn ${c.pressure ?? "?"}hPa`;
    }).join(" || ");

    document.querySelector("#ticker span").textContent = text;
}

/* =========================
   RADIO TTS REPORT
========================= */
function speakReport(){

    const sorted = [...GLOBAL]
        .filter(c=>c && c.temp != null)
        .sort((a,b)=>weatherScore(b)-weatherScore(a));

    sorted.forEach(c=>{
        SpeechQueue.add(
            `${c.name}. temperatura ${c.temp}. wilgotność ${c.humidity}. wiatr ${c.wind}. ciśnienie ${c.pressure}.`
        );
    });
}

/* =========================
   AUTO RADIO (10 MIN)
========================= */
setInterval(()=>{
    speechSynthesis.cancel();
    SpeechQueue.q = [];
    speakReport();
}, 600000);

/* =========================
   LOAD DATA
========================= */
function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        GLOBAL = d.cities;
        draw(GLOBAL);
        ticker(GLOBAL);
    });
}

setInterval(load, 60000);
load();

setTimeout(speakReport, 5000);

</script>

</body>
</html>

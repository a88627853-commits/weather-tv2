<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

#tv {
    width:1000px;
    height:1000px;
    margin:auto;
    position:relative;
}

#map {
    width:100%;
    height:100%;
    position:absolute;
    object-fit:cover;
}

/* MARKERY */
.marker {
    position:absolute;
    width:14px;
    height:14px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    border:2px solid white;
    transition:all 0.5s ease;
    background-size:cover;
}

.marker.sunny { background-color:#00ff00; }
.marker.cloudy { background-color:#999999; }
.marker.rain { background-color:#0099ff; }
.marker.storm { background-color:#ff0000; }
.marker.fog { background-color:#bbbbbb; }

/* TICKER */
#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    overflow:hidden;
    white-space:nowrap;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 80s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

/* EAS */
#eas {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:red;
    font-size:40px;
    z-index:999;
}

/* SUWAK */
#sliderBox {
    position:fixed;
    top:10px;
    left:10px;
    background:#111;
    padding:10px;
    z-index:9999;
}
</style>
</head>

<body>

<div id="sliderBox">
    X <input id="xoff" type="range" min="-100" max="100" value="0"><br>
    Y <input id="yoff" type="range" min="-100" max="100" value="0">
</div>

<div id="tv">
    <img id="map" src="map.png">
</div>

<div id="ticker"><span>LOADING...</span></div>
<div id="eas"></div>

<script>

/* MAPA + OFFSET */
const MAP = {
    latMin:49.0,
    latMax:55.2,
    lonMin:14.0,
    lonMax:24.5
};

function geo(lat, lon){
    const m = document.getElementById("map");

    const xoff = parseInt(document.getElementById("xoff").value);
    const yoff = parseInt(document.getElementById("yoff").value);

    return {
        x: ((lon-MAP.lonMin)/(MAP.lonMax-MAP.lonMin))*m.clientWidth + xoff,
        y: ((MAP.latMax-lat)/(MAP.latMax-MAP.latMin))*m.clientHeight + yoff
    };
}

/* TTS */
const TTS = {
    last:"",

    speak(text){
        if(!("speechSynthesis" in window)) return;
        if(text === this.last) return;

        this.last = text;
        speechSynthesis.cancel();

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "pl-PL";
        msg.rate = 1;

        speechSynthesis.speak(msg);
    }
};

/* KOLOR */
function getClass(c){
    if(!c) return "fog";

    if(c.code === 1000) return "sunny";
    if(c.text && c.text.toLowerCase().includes("rain")) return "rain";
    if(c.text && c.text.toLowerCase().includes("thunder")) return "storm";
    if(c.cloud > 70) return "cloudy";

    return "cloudy";
}

/* MARKERY */
function draw(cities){
    document.querySelectorAll(".marker").forEach(e=>e.remove());

    cities.forEach(c=>{
        if(!c.lat || !c.lon) return;

        let p = geo(c.lat,c.lon);

        let d = document.createElement("div");
        d.className = "marker " + getClass(c);

        d.style.left = p.x + "px";
        d.style.top = p.y + "px";

        if(c.icon){
            d.style.backgroundImage = `url(${c.icon})`;
        }

        document.getElementById("tv").appendChild(d);
    });
}

/* TICKER */
let last = "";

function ticker(cities){

    const text = cities.map(c=>{
        return `${c.name}: ${c.temp ?? "?"}°C | Wiatr ${c.wind ?? "?"}km/h | Wilg ${c.humidity ?? "?"}% | Ciśn ${c.pressure ?? "?"}hPa`;
    }).join(" || ");

    document.querySelector("#ticker span").textContent = text;

    if(text !== last){
        TTS.speak("Aktualizacja pogody");
        last = text;
    }
}

/* EAS */
function eas(cities){
    let active = cities.some(c=>c.alert==="EAS");
    let box = document.getElementById("eas");

    if(active){
        box.style.display="flex";
        box.innerText="⚠ EAS ACTIVE ⚠";
        speechSynthesis.cancel();
    } else {
        box.style.display="none";
    }
}

/* LOOP */
function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        draw(d.cities);
        ticker(d.cities);
        eas(d.cities);
    });
}

setInterval(load, 10000);
load();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV - Final Commit</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* ===== LISTA ===== */
#list {
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:8px;
    height: calc(100vh - 60px);
    overflow:auto;
}

.city {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    background:#111;
    border-left:6px solid gray;
    transition:0.3s;
}

.city:hover { background:#1a1a1a; }

.city img {
    width:32px;
    height:32px;
}

/* ===== ALERT COLORS ===== */
.sunny { border-left-color:#00ff00; }
.cloudy { border-left-color:#999; }
.rain { border-left-color:#0099ff; }
.storm { border-left-color:#ff0000; }
.fog { border-left-color:#666; }

/* ===== TICKER ===== */
#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    white-space:nowrap;
    overflow:hidden;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 60s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

/* ===== TOP ===== */
#top {
    padding:10px;
    background:#000;
    border-bottom:1px solid #222;
    color:lime;
    font-size:14px;
}

/* ===== EAS ===== */
#eas {
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:red;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:40px;
    z-index:999;
}
</style>
</head>

<body>

<div id="top">WEATHER TV FINAL SYSTEM</div>
<div id="list"></div>
<div id="ticker"><span>LOADING...</span></div>
<div id="eas"></div>

<script>

let GLOBAL = [];

/* =========================
   WEATHER SCORE (FINAL FIX)
========================= */
function weatherScore(c){

    if(!c || !c.temp) return 999;

    let score = 0;
    const t = (c.text || "").toLowerCase();

    // 🌩 burze
    if(t.includes("thunder")) score += 120;

    // 🌧 deszcz
    else if(t.includes("heavy rain") || t.includes("downpour")) score += 100;
    else if(t.includes("rain")) score += 55;
    else if(t.includes("drizzle")) score += 15;

    // 🌫 MGŁA (POPRAWIONA LOGIKA)
    if(t.includes("fog") || t.includes("mist")){

        if(c.vis != null && c.vis < 2){
            score += 80;
        }
        else if(c.vis != null && c.vis < 5){
            score += 40;
        }
        else {
            score += 5; // 25km = prawie zero wpływu
        }
    }

    // ☁ chmury
    score += (c.cloud ?? 0) * 0.15;

    // 💨 wiatr
    score += (c.wind ?? 0) * 0.4;

    // 👀 widoczność
    if(c.vis != null){
        if(c.vis < 2) score += 50;
        else if(c.vis < 5) score += 25;
    }

    return score;
}

/* =========================
   COLOR CLASS
========================= */
function cls(c){
    if(!c || !c.temp) return "fog";
    const t = (c.text || "").toLowerCase();

    if(t.includes("thunder")) return "storm";
    if(t.includes("rain")) return "rain";
    if(t.includes("fog") || t.includes("mist")) return "fog";
    if(c.cloud > 70) return "cloudy";

    return "sunny";
}

/* =========================
   DRAW RANKING
========================= */
function draw(cities){

    const list = document.getElementById("list");
    list.innerHTML = "";

    const clean = cities.filter(c => c && c.name && c.temp != null);

    const sorted = [...clean].sort((a,b)=>
        weatherScore(b) - weatherScore(a)
    );

    sorted.forEach((c,i)=>{

        const div = document.createElement("div");
        div.className = "city " + cls(c);

        const danger =
            weatherScore(c) > 120 ? "🔴 EKSTREMALNA"
            : weatherScore(c) > 80 ? "🟠 ZŁA"
            : weatherScore(c) > 50 ? "🟡 ŚREDNIA"
            : "🟢 DOBRA";

        div.innerHTML = `
            <div>
                <b>#${i+1} ${c.name}</b> ${danger}<br>
                ${c.text ?? ""}
            </div>

            <div>
                🌡 ${c.temp}°C<br>
                💨 ${c.wind ?? "?"} km/h<br>
                💧 ${c.humidity ?? "?"}%<br>
                ⬇ ${c.pressure ?? "?"} hPa
            </div>

            <div>
                ${c.icon ? `<img src="${c.icon}">` : ""}
            </div>
        `;

        list.appendChild(div);
    });
}

/* =========================
   TICKER
========================= */
function ticker(cities){

    const text = cities.map(c=>{
        return `${c.name}: ${c.temp ?? "?"}°C | Wiatr ${c.wind ?? "?"}km/h | Wilg ${c.humidity ?? "?"}% | Ciśn ${c.pressure ?? "?"}hPa`;
    }).join(" || ");

    document.querySelector("#ticker span").textContent = text;
}

/* =========================
   LOAD DATA
========================= */
function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        GLOBAL = d.cities;

        draw(GLOBAL);
        ticker(GLOBAL);
    });
}

setInterval(load, 60000);
load();

</script>

</body>
</html>

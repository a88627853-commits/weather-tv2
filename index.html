<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; overflow:hidden; }

#tv {
    width:960px;
    height:960px;
    margin:auto;
    position:relative;
}

#map {
    width:100%;
    height:100%;
    position:absolute;
    object-fit:cover;
}

.marker {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    transform:translate(-50%,-50%);
}

.marker.OK { background:lime; }
.marker.EAS { background:red; }

#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    overflow:hidden;
    white-space:nowrap;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 40s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

#eas {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:red;
    font-size:40px;
    z-index:999;
}
</style>
</head>

<body>

<div id="tv">
    <img id="map" src="map.png?v=2">
</div>

<div id="ticker"><span>LOADING...</span></div>

<div id="eas"></div>

<script>

let EAS = false;
let loop = null;

const MAP = {
    latMin:49.0,
    latMax:55.2,
    lonMin:14.0,
    lonMax:24.5
};

function geo(lat, lon){
    const m = document.getElementById("map");

    return {
        x: ((lon-MAP.lonMin)/(MAP.lonMax-MAP.lonMin))*m.clientWidth,
        y: ((MAP.latMax-lat)/(MAP.latMax-MAP.latMin))*m.clientHeight
    };
}

function draw(cities){
    document.querySelectorAll(".marker").forEach(e=>e.remove());

    cities.forEach(c=>{
        if(!c.lat||!c.lon) return;

        let p = geo(c.lat,c.lon);

        let d = document.createElement("div");
        d.className = "marker " + (c.alert==="EAS"?"EAS":"OK");

        d.style.left = p.x+"px";
        d.style.top = p.y+"px";

        document.getElementById("tv").appendChild(d);
    });
}

function ticker(cities){
    document.querySelector("#ticker span").innerText =
        cities.map(c=>{
            let cur = c.current || {};
            return `${c.name} ${cur.temperature_2m??"?"}°C | ${cur.wind_speed_10m??"?"} m/s`;
        }).join(" | ");
}

function setEAS(state){
    let box = document.getElementById("eas");

    if(state){
        EAS = true;
        box.style.display = "flex";
        box.innerText = "⚠ EAS ACTIVE ⚠";

        clearInterval(loop);
        speechSynthesis.cancel();
    } else {
        EAS = false;
        box.style.display = "none";
        start();
    }
}

function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        let cities = d.cities;

        if(d.eas && !EAS) setEAS(true);
        if(!d.eas && EAS) setEAS(false);

        if(!EAS){
            ticker(cities);
            draw(cities);
        }
    });
}

function start(){
    loop = setInterval(load, 15000);
    load();
}

start();

</script>

</body>
</html>

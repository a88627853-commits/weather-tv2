<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

#tv {
    width:1000px;
    height:1000px;
    margin:auto;
    position:relative;
}

#map {
    width:100%;
    height:100%;
    position:absolute;
    object-fit:cover;
}

/* MARKERY */
.marker {
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    border:2px solid white;
    transition:all 0.5s ease;
    display:flex;
    align-items:center;
    justify-content:center;
}

.marker img {
    width:16px;
    height:16px;
}

.marker.sunny { background:#00ff00; }
.marker.cloudy { background:#a0a0a0; }
.marker.rain { background:#0099ff; }
.marker.storm { background:#ff0000; }
.marker.fog { background:#bbbbbb; }

/* TICKER */
#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    overflow:hidden;
    white-space:nowrap;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 80s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

/* EAS */
#eas {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:red;
    font-size:40px;
    z-index:999;
}

/* SLIDER */
#sliderBox {
    position:fixed;
    top:10px;
    left:10px;
    background:#111;
    padding:10px;
    z-index:9999;
}
</style>
</head>

<body>

<div id="sliderBox">
X offset <input id="xoff" type="range" min="-100" max="100" value="0"><br>
Y offset <input id="yoff" type="range" min="-100" max="100" value="0">
</div>

<div id="tv">
    <img id="map" src="map.png">
</div>

<div id="ticker"><span>LOADING...</span></div>
<div id="eas"></div>

<script>

/* MAPA */
const MAP = {
    latMin:49.0,
    latMax:55.2,
    lonMin:14.0,
    lonMax:24.5
};

function geo(lat, lon){
    const m = document.getElementById("map");

    const xoff = +document.getElementById("xoff").value;
    const yoff = +document.getElementById("yoff").value;

    return {
        x: ((lon-MAP.lonMin)/(MAP.lonMax-MAP.lonMin))*m.clientWidth + xoff,
        y: ((MAP.latMax-lat)/(MAP.latMax-MAP.latMin))*m.clientHeight + yoff
    };
}

/* TTS QUEUE (NIE GLITCHUJE) */
const SpeechQueue = {
    q: [],
    speaking: false,

    beep(){
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        o.frequency.value = 440;
        o.connect(ctx.destination);
        o.start();
        setTimeout(()=>o.stop(), 120);
    },

    speakNext(){
        if(this.q.length === 0){
            this.speaking = false;
            return;
        }

        this.speaking = true;

        const text = this.q.shift();

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "pl-PL";
        msg.rate = 0.95;

        msg.onend = () => {
            this.beep();
            setTimeout(()=>this.speakNext(), 400);
        };

        speechSynthesis.speak(msg);
    },

    add(text){
        this.q.push(text);
        if(!this.speaking) this.speakNext();
    }
};


/* KOLOR */
function getClass(c){
    if(!c.temp) return "fog";
    if(c.code >= 1000 && c.code < 1100) return "sunny";
    if(c.text && c.text.toLowerCase().includes("rain")) return "rain";
    if(c.text && c.text.toLowerCase().includes("thunder")) return "storm";
    if(c.cloud > 70) return "cloudy";
    return "cloudy";
}


/* MARKERY */
function draw(cities){
    document.querySelectorAll(".marker").forEach(e=>e.remove());

    cities.forEach(c=>{
        if(!c.lat || !c.lon) return;

        const p = geo(c.lat,c.lon);

        const d = document.createElement("div");
        d.className = "marker " + getClass(c);

        d.style.left = p.x+"px";
        d.style.top = p.y+"px";

        if(c.icon){
            const img = document.createElement("img");
            img.src = c.icon;
            d.appendChild(img);
        }

        document.getElementById("tv").appendChild(d);
    });
}


/* TICKER */
function ticker(cities){

    const text = cities.map(c=>{
        return `${c.name}: ${c.temp ?? "?"}°C | Wiatr ${c.wind ?? "?"}km/h | Wilg ${c.humidity ?? "?"}% | Ciśn ${c.pressure ?? "?"}hPa`;
    }).join(" || ");

    document.querySelector("#ticker span").textContent = text;
}


/* TTS SEQUENTIAL CITY READER */
function speakCities(cities){

    cities.forEach(c=>{
        if(!c.name) return;

        const t =
            `${c.name}. ` +
            `Temperatura ${c.temp ?? "brak danych"} stopni. ` +
            `Wilgotność ${c.humidity ?? "brak danych"} procent. ` +
            `Wiatr ${c.wind ?? "brak danych"} kilometrów na godzinę. ` +
            `Ciśnienie ${c.pressure ?? "brak danych"} hektopaskali.`;

        SpeechQueue.add(t);
    });
}


/* EAS */
function eas(cities){
    const active = cities.some(c=>c.alert==="EAS");
    const box = document.getElementById("eas");

    if(active){
        box.style.display="flex";
        box.innerText="⚠ EAS ACTIVE ⚠";
        speechSynthesis.cancel();
    } else {
        box.style.display="none";
    }
}


/* MAIN */
function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        draw(d.cities);
        ticker(d.cities);
        eas(d.cities);

        // 🔥 TTS tylko co update
        SpeechQueue.q = [];
        speechSynthesis.cancel();
        speakCities(d.cities);
    });
}

setInterval(load, 60000); // 1 min update (stabilnie)
load();

</script>

</body>
</html>

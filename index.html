<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Weather TV</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; overflow:hidden; }

#tv {
    width:960px;
    height:960px;
    margin:auto;
    position:relative;
    overflow:hidden; /* 🔥 FIX: mapa + markery nie wychodzą */
}

#map {
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;
    object-fit:cover;
    display:block;
    z-index:0;
}

.marker {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    z-index:2;
}

.marker.OK { background:lime; }
.marker.EAS { background:red; }

#ticker {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:lime;
    overflow:hidden;
    white-space:nowrap;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:scroll 40s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

#eas {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:red;
    font-size:40px;
    z-index:999;
}
</style>
</head>

<body>

<div id="tv">
    <img id="map" src="map.png?v=2">
</div>

<div id="ticker"><span>LOADING...</span></div>

<div id="eas"></div>

<script>

let EAS = false;
let loop = null;
let mapReady = false;

const MAP = {
    latMin:49.0,
    latMax:55.2,
    lonMin:14.0,
    lonMax:24.5
};

/* =========================
   MAP INIT (🔥 FIX KLUCZOWY)
========================= */
window.addEventListener("load", () => {
    const img = document.getElementById("map");

    function enableMap(){
        mapReady = true;
        load();
    }

    img.onload = () => {
        enableMap();
    };

    // fallback (bo cache / render czasem nie odpala onload)
    setTimeout(enableMap, 1200);
});

/* =========================
   GEO FIX (POPRAWNE WYMIARY)
========================= */
function geo(lat, lon){
    const m = document.getElementById("map");

    let w = m.offsetWidth;
    let h = m.offsetHeight;

    return {
        x: ((lon - MAP.lonMin) / (MAP.lonMax - MAP.lonMin)) * w,
        y: ((MAP.latMax - lat) / (MAP.latMax - MAP.latMin)) * h
    };
}

/* =========================
   MAP DRAW (SAFE)
========================= */
function draw(cities){

    if(!mapReady) return;

    document.querySelectorAll(".marker").forEach(e => e.remove());

    cities.forEach(c => {
        if(!c.lat || !c.lon) return;

        let p = geo(c.lat, c.lon);

        let d = document.createElement("div");
        d.className = "marker " + (c.alert === "EAS" ? "EAS" : "OK");

        d.style.left = p.x + "px";
        d.style.top = p.y + "px";

        document.getElementById("tv").appendChild(d);
    });
}

/* =========================
   TICKER (TWÓJ ORYGINAŁ)
========================= */
function updateTicker(cities){
    document.querySelector("#ticker span").innerText =
        cities.map(c => {
            let cur = c.current || {};
            let h = c.hourly || {};

            return `${c.name} | ` +
                `Temp (2m): ${cur.temperature_2m ?? "brak"}°C | ` +
                `Apparent: ${cur.apparent_temperature ?? "brak"}°C | ` +
                `Humidity: ${cur.relative_humidity_2m ?? "brak"}% | ` +
                `Precip Prob: ${h.precipitation_probability?.[0] ?? "brak"}% | ` +
                `Precip: ${h.precipitation?.[0] ?? "brak"} mm | ` +
                `Snow Depth: ${h.snow_depth?.[0] ?? "brak"} | ` +
                `Wind 10m: ${cur.wind_speed_10m ?? "brak"} m/s | ` +
                `Wind 80m: ${h.wind_speed_80m?.[0] ?? "brak"} m/s | ` +
                `Wind Dir: ${h.wind_direction_10m?.[0] ?? "brak"}° | ` +
                `Gusts: ${h.wind_gusts_10m?.[0] ?? "brak"} m/s | ` +
                `Clouds: ${cur.cloud_cover ?? "brak"}% | ` +
                `Pressure MSL: ${cur.pressure_msl ?? "brak"} hPa | ` +
                `Surface Pressure: ${cur.surface_pressure ?? "brak"} hPa | ` +
                `Visibility: ${cur.visibility ?? "brak"} m | ` +
                `UV: ${h.uv_index?.[0] ?? "brak"} | ` +
                `UV Clear: ${h.uv_index_clear_sky?.[0] ?? "brak"} | ` +
                `Sunshine: ${h.sunshine_duration?.[0] ?? "brak"} | ` +
                `Weather Code: ${cur.weather_code ?? "brak"} | ` +
                `Is Day: ${cur.is_day ?? "brak"} | ` +
                `Max Temp: ${h.temperature_2m_max?.[0] ?? "brak"}°C | ` +
                `Min Temp: ${h.temperature_2m_min?.[0] ?? "brak"}°C | ` +
                `Sunrise: ${h.sunrise?.[0] ?? "brak"} | ` +
                `Sunset: ${h.sunset?.[0] ?? "brak"}`;
        }).join(" || ");
}

/* =========================
   EAS SYSTEM
========================= */
function setEAS(state){
    let box = document.getElementById("eas");

    if(state){
        EAS = true;
        box.style.display = "flex";
        box.innerText = "⚠ EAS ACTIVE ⚠";

        clearInterval(loop);
        speechSynthesis.cancel();
    } else {
        EAS = false;
        box.style.display = "none";
        start();
    }
}

/* =========================
   LOAD LOOP
========================= */
function load(){
    fetch("/data")
    .then(r=>r.json())
    .then(d=>{
        let cities = d.cities;

        if(d.eas && !EAS) setEAS(true);
        if(!d.eas && EAS) setEAS(false);

        if(!EAS){
            updateTicker(cities);
            draw(cities);
        }
    });
}

function start(){
    loop = setInterval(load, 15000);
    load();
}

start();

</script>

</body>
</html>
